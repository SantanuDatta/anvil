name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            libqt6svg6-dev \
            libgl1-mesa-dev \
            libssl-dev

      - name: Configure
        run: |
          QT_PREFIX=$(qtpaths6 --qt-install-prefix)
          cmake -S . -B build \
            -DENABLE_TESTING=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${QT_PREFIX}" \
            -DQt6_DIR="${QT_PREFIX}/lib/cmake/Qt6"

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure
